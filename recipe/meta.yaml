{% set version = "1.0-9" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-mlmrev
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/mlmRev_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/mlmRev/mlmRev_{{ version }}.tar.gz
  sha256: 649c5af0dc39f213f6ed6dec5ea3873954ddda08ac99f5557fb27c4f57abed32

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-lme4
  run:
    - r-base
    - r-lme4

test:
  commands:
    - $R -e "library('mlmRev')"           # [not win]
    - "\"%R%\" -e \"library('mlmRev')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=mlmRev
  license: GPL-2.0-or-later
  summary: Data and examples from a multilevel modelling software review as well as other well-known data sets from the multilevel modelling literature.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

